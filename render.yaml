services:
  # ── Frontend: React/Vite Static Site ──────────────────────────────────
  - type: web
    name: visualix-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /api/*
        destination: https://visualix-backend.onrender.com/api/:splat
      - type: rewrite
        source: /uploads/*
        destination: https://visualix-backend.onrender.com/uploads/:splat
      - type: rewrite
        source: /*
        destination: /index.html

  # ── Backend: Spring Boot Java Web Service ─────────────────────────────
  - type: web
    name: visualix-backend
    runtime: java
    rootDir: backend
    buildCommand: ./gradlew bootJar
    startCommand: java -jar build/libs/*.jar
    envVars:
      - key: JAVA_VERSION
        value: 17
