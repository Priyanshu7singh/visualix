<svg viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Rich 3D Gold Gradient matching the uploaded logo -->
    <linearGradient id="gold-grad" x1="0" y1="0" x2="120" y2="120" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stopColor="#7A5C10"/>
      <stop offset="15%" stopColor="#C9962A"/>
      <stop offset="35%" stopColor="#FFF4A0"/>
      <stop offset="55%" stopColor="#D4AF37"/>
      <stop offset="75%" stopColor="#F5E67A"/>
      <stop offset="100%" stopColor="#7A5C10"/>
    </linearGradient>
    
    <!-- Outer Glow & Drop Shadow for 3D depth -->
    <filter id="gold-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#000" flood-opacity="0.9"/>
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#000" flood-opacity="0.7"/>
    </filter>
  </defs>

  <g filter="url(#gold-glow)">
    <!-- Main Inverted Triangle Frame -->
    <path d="M 6 20 L 114 20 L 60 110 Z" fill="none" stroke="url(#gold-grad)" strokeWidth="8" strokeLinejoin="round"/>
    
    <!-- Solid Play Button with cutout hole (simulated using thick stroke) -->
    <path d="M 36 42 L 58 60 L 36 78 Z" fill="none" stroke="url(#gold-grad)" strokeWidth="10" strokeLinejoin="round"/>

    <!-- Exact Waveform overlapping right edge -->
    <path d="M 63 60 H 65 V 66 A 1.5 1.5 0 0 0 68 66 V 48 A 1.5 1.5 0 0 1 71 48 V 66 A 1.5 1.5 0 0 0 74 66 V 36 A 1.5 1.5 0 0 1 77 36 V 66 A 1.5 1.5 0 0 0 80 66 V 46 A 1.5 1.5 0 0 1 83 46 V 62 A 1.5 1.5 0 0 0 86 62 V 54 A 1.5 1.5 0 0 1 89 54 V 60 A 1.5 1.5 0 0 0 92 60 H 104" fill="none" stroke="url(#gold-grad)" strokeWidth="4" strokeLinecap="round" strokeLinejoin="round"/>
  </g>
</svg>